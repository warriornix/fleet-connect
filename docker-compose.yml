version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vlip
      POSTGRES_PASSWORD: vlip
      POSTGRES_DB: vlip
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vlip"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [vlip]
  backend:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://vlip:vlip@postgres:5432/vlip?schema=public
      JWT_SECRET: change-me
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
    ports: ["5000:5000"]
    networks: [vlip]
volumes:
  pgdata:
networks:
  vlip:
    driver: bridge
